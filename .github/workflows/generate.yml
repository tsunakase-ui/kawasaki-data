name: 📰 記事生成

on:
  schedule:
    # UTC 06:00 = JST 15:00
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '記事の日付 (YYYY-MM-DD形式、空なら今日)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 チェックアウト
        uses: actions/checkout@v4

      - name: 📦 Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 依存関係インストール
        run: npm ci

      - name: 🤖 記事生成
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            node scripts/generate.mjs --date "${{ inputs.date }}"
          else
            node scripts/generate.mjs
          fi

      - name: 📤 変更をコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/articles/
          if git diff --staged --quiet; then
            echo "変更なし、スキップ"
          else
            git commit -m "📰 記事を追加: $(date +'%Y-%m-%d' -d '+9 hours')"
            git push
          fi
